<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscar Estéreo 88.1 FM | Tu alternativa musical</title>

    <!-- Tailwind CSS (local) -->
    <script src="js/tailwindcss.js"></script>
    
    <!-- FontAwesome Icons (local) -->
    <link rel="stylesheet" href="css/font-awesome.min.css">
    
    <!-- Google Fonts: Inter & Outfit (local) -->
    <link rel="stylesheet" href="css/local-fonts.css">
    
    <!-- React and ReactDOM (local) -->
    <script src="js/react.production.min.js"></script>
    <script src="js/react-dom.production.min.js"></script>

    <script src="js/babel.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0c;
        }
        html {
            scroll-padding-top: 70px;
        }
        h1, h2, h3, .font-display {
            font-family: 'Outfit', sans-serif;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #121214;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #E11D48;
        }
        /* Vinyl spinning keyframe animation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 6s linear infinite;
        }
        /* Smooth transition for audio arm */
        .tonearm-transition {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .touch-manipulation {
            touch-action: manipulation;
        }
        /* Background image sections */
        .bg-section {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        .bg-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(11,11,12,0.85), rgba(11,11,12,0.92));
            z-index: 0;
        }
        .bg-section > * {
            position: relative;
            z-index: 1;
        }
        .bg-header-hero {
            background-image: url('images/bg-header.jpg');
        }
        .bg-about-section {
            background-image: url('images/bg-about.jpg');
        }
        .bg-programming-section {
            background-image: url('images/bg-programming.jpg');
        }
        .bg-comments-section {
            background-image: url('images/bg-comments.jpg');
        }
    </style>
</head>
<body class="text-zinc-100 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Stream Presets - Señal Real de Oscar Estéreo asignada como principal
        const PRESET_STREAMS = [
            { name: "Oscar Estéreo 88.1 FM (Señal Real)", url: "https://micanal.ovh/radio/oscarestereotv/live.mp3" },
            { name: "Señal Digital de Respaldo", url: "https://stream.zeno.fm/g6tcz32vux8uv" }
        ];

        function App() {
            const [isPlaying, setIsPlaying] = useState(false);
            const [streamUrl, setStreamUrl] = useState(PRESET_STREAMS[0].url);
            const [volume, setVolume] = useState(0.8);
            const [customUrlInput, setCustomUrlInput] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            const [currentTimeStr, setCurrentTimeStr] = useState("");
            const [broadcastStatus, setBroadcastStatus] = useState("idle");
            
            // Interaction Board State
            const [comments, setComments] = useState([
                { id: 1, author: "Carlos Torres", text: "¡Un gran saludo a toda la gente de Quebrada Arriba! Se escucha excelente desde Carora.", request: "Los Cardenales del Éxito", timestamp: new Date(Date.now() - 1800000) },
                { id: 2, author: "Maria Elena", text: "Felicitaciones por la excelente programación de la 88.1, siempre conectados con la buena música.", request: "Las Avispas", timestamp: new Date(Date.now() - 3600000) },
                { id: 3, author: "Pedro Cordero", text: "El Blanco presente y activo en sintonía.", request: "Música llanera", timestamp: new Date(Date.now() - 5400000) }
            ]);
            const [authorName, setAuthorName] = useState("");
            const [commentText, setCommentText] = useState("");
            const [songRequest, setSongRequest] = useState("");
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [notification, setNotification] = useState(null);
            const [showBackToTop, setShowBackToTop] = useState(false);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const audioRef = useRef(null);
            const visualizerInterval = useRef(null);
            const staleTimerRef = useRef(null);
            const [equalizerHeights, setEqualizerHeights] = useState([30, 15, 45, 20, 35, 50, 25, 40, 10, 30, 45, 15]);

            // Scroll personalizado lento y suave
            const smoothScrollTo = (targetY, duration = 1200) => {
                const startY = window.scrollY;
                const distance = targetY - startY;
                const startTime = performance.now();

                const easeInOutCubic = (t) => {
                    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                };

                const step = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = easeInOutCubic(progress);
                    window.scrollTo(0, startY + distance * eased);
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    }
                };
                requestAnimationFrame(step);
            };

            const scrollToSection = (e, targetId) => {
                e.preventDefault();
                const el = document.getElementById(targetId);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - 80;
                    smoothScrollTo(y, 1200);
                }
            };

            const scrollToTop = () => {
                smoothScrollTo(0, 1500);
            };

            useEffect(() => {
                const handleScroll = () => {
                    setShowBackToTop(window.scrollY > 400);
                };
                window.addEventListener('scroll', handleScroll);

                const updateClock = () => {
                    const now = new Date();
                    setCurrentTimeStr(now.toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
                };
                updateClock();
                const clockInterval = setInterval(updateClock, 1000);

                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    clearTimeout(staleTimerRef.current);
                    if (audioRef.current) {
                        audioRef.current.pause();
                        audioRef.current = null;
                    }
                    clearInterval(clockInterval);
                };
            }, []);

            const getOrCreateAudio = (url) => {
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.onerror = null;
                    audioRef.current.onplaying = null;
                    audioRef.current.onstalled = null;
                    audioRef.current.onwaiting = null;
                    audioRef.current.onemptied = null;
                    audioRef.current.removeAttribute('src');
                    audioRef.current.load();
                }
                clearTimeout(staleTimerRef.current);

                const audio = new Audio();
                audio.preload = 'auto';
                audio.volume = volume;

                audio.onerror = () => {
                    setBroadcastStatus("off_air");
                    showNotification("No se pudo conectar con la señal.");
                    setIsPlaying(false);
                };

                audio.onplaying = () => {
                    setBroadcastStatus("on_air");
                    clearTimeout(staleTimerRef.current);
                };

                const startStaleTimer = () => {
                    clearTimeout(staleTimerRef.current);
                    staleTimerRef.current = setTimeout(() => {
                        if (audioRef.current && !audioRef.current.paused) {
                            setBroadcastStatus("off_air");
                            showNotification("Disculpe, en estos momentos no estamos al aire.");
                        }
                    }, 12000);
                };

                audio.onstalled = () => {
                    setBroadcastStatus("connecting");
                    startStaleTimer();
                };

                audio.onwaiting = () => {
                    setBroadcastStatus("connecting");
                    startStaleTimer();
                };

                audio.onemptied = () => {
                    setBroadcastStatus("off_air");
                };

                audio.src = url;
                audioRef.current = audio;
                return audio;
            };

            const changeStreamUrl = (newUrl) => {
                const wasPlaying = isPlaying;
                setStreamUrl(newUrl);
                const audio = getOrCreateAudio(newUrl);
                
                if (wasPlaying) {
                    audio.play()
                        .then(() => setIsPlaying(true))
                        .catch(err => {
                            console.error("Audio error: ", err);
                            setIsPlaying(false);
                        });
                }
                showNotification("Sintonizando nueva señal digital...");
            };

            const handlePlayPause = () => {
                if (isPlaying) {
                    if (audioRef.current) {
                        audioRef.current.pause();
                    }
                    clearTimeout(staleTimerRef.current);
                    setIsPlaying(false);
                    setBroadcastStatus("idle");
                    showNotification("Transmisión en pausa");
                } else {
                    const audio = getOrCreateAudio(streamUrl);
                    setBroadcastStatus("connecting");
                    showNotification("Sintonizando señal en vivo...");
                    audio.play()
                        .then(() => {
                            setIsPlaying(true);
                            setBroadcastStatus("on_air");
                            showNotification("¡Al Aire! Escuchando Oscar Estéreo 88.1 FM");
                        })
                        .catch(err => {
                            console.error("Error playing audio: ", err);
                            setBroadcastStatus("off_air");
                            showNotification("No se pudo conectar. Verifica tu conexión de datos.");
                            setIsPlaying(false);
                        });
                }
            };

            const handleVolumeChange = (e) => {
                const newVolume = parseFloat(e.target.value);
                setVolume(newVolume);
                if (audioRef.current) {
                    audioRef.current.volume = newVolume;
                }
            };

            useEffect(() => {
                if (isPlaying) {
                    visualizerInterval.current = setInterval(() => {
                        setEqualizerHeights(prev => prev.map(() => Math.floor(Math.random() * 55) + 10));
                    }, 100);
                } else {
                    clearInterval(visualizerInterval.current);
                    setEqualizerHeights([10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10, 10]);
                }
                return () => clearInterval(visualizerInterval.current);
            }, [isPlaying]);

            const handleSubmitComment = (e) => {
                e.preventDefault();
                if (!authorName.trim() || !commentText.trim()) {
                    showNotification("Por favor completa tu nombre y mensaje.");
                    return;
                }

                setIsSubmitting(true);
                const newComment = {
                    id: Date.now(),
                    author: authorName,
                    text: commentText,
                    request: songRequest,
                    timestamp: new Date()
                };

                setTimeout(() => {
                    setComments(prev => [newComment, ...prev]);
                    showNotification("¡Tu saludo ha sido publicado!");
                    setCommentText("");
                    setSongRequest("");
                    setIsSubmitting(false);
                }, 600);
            };

            const showNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3500);
            };

            const handleCustomUrlSubmit = (e) => {
                e.preventDefault();
                if (customUrlInput.trim()) {
                    changeStreamUrl(customUrlInput.trim());
                    setShowSettings(false);
                } else {
                    showNotification("Ingresa una URL válida");
                }
            };

            return (
                <div className="min-h-screen bg-[#0b0b0c] text-zinc-100 flex flex-col selection:bg-rose-600 selection:text-white">
                    
                    {/* Floating Alert Messages */}
                    {notification && (
                        <div className="fixed bottom-6 right-6 z-50 bg-rose-600 text-white font-medium px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-rose-500 animate-bounce">
                            <i className="fas fa-satellite-dish animate-pulse"></i>
                            <span>{notification}</span>
                        </div>
                    )}

                    {/* Back to Top Button */}
                    {showBackToTop && (
                        <button
                            onClick={scrollToTop}
                            className="fixed bottom-6 right-6 z-50 w-12 h-12 bg-rose-600 hover:bg-rose-700 text-white rounded-full shadow-lg shadow-rose-600/30 flex items-center justify-center transition-all transform hover:scale-110"
                            aria-label="Volver arriba"
                        >
                            <i className="fas fa-chevron-up text-lg"></i>
                        </button>
                    )}

                    {/* Navigation Bar */}
                    <nav className="sticky top-0 z-40 backdrop-blur-md bg-zinc-950/80 border-b border-zinc-900 px-4 py-3 md:px-8">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full overflow-hidden border-2 border-rose-600 relative flex-shrink-0">
                                    <img 
                                        src="images/logo_oscar-stereo.png" 
                                        alt="Oscar Estéreo 88.1 FM Logo" 
                                        className={`w-full h-full object-cover ${isPlaying ? 'animate-spin-slow' : ''}`}
                                        onError={(e) => { e.target.src='https://placehold.co/40x40/222222/e11d48?text=OE' }}
                                    />
                                </div>
                                <div className="hidden sm:block">
                                    <span className="font-display font-black text-lg tracking-wider text-white">OSCAR <span className="text-rose-600">ESTÉREO</span></span>
                                    <div className="text-[10px] text-zinc-400 font-semibold tracking-widest -mt-1 uppercase">88.1 FM • Tu alternativa musical</div>
                                </div>
                            </div>

                            {/* Desktop Navigation Links */}
                            <div className="hidden lg:flex items-center gap-6">
                                <a href="#" onClick={(e) => { e.preventDefault(); smoothScrollTo(0, 1200); }} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 transition-colors duration-300 cursor-pointer">Inicio</a>
                                <a href="#biografia" onClick={(e) => scrollToSection(e, 'biografia')} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 transition-colors duration-300 cursor-pointer">Historia</a>
                                <a href="#comentarios" onClick={(e) => scrollToSection(e, 'comentarios')} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 transition-colors duration-300 cursor-pointer">Programas</a>
                                <a href="#comentarios" onClick={(e) => scrollToSection(e, 'comentarios')} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 transition-colors duration-300 cursor-pointer">Contacto</a>
                                <a href="https://micanal.ovh/channel/live-stream/oscarestereotv" target="_blank" rel="noopener noreferrer" className="text-xs font-bold uppercase tracking-wider text-emerald-500 hover:text-emerald-400 transition-colors duration-300 flex items-center gap-1.5">
                                    <i className="fas fa-tv text-[10px]"></i> TV en Vivo
                                </a>
                            </div>

                            {/* Clock, Signal Status & Hamburger */}
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex flex-col items-end text-right">
                                    <span className="text-[10px] text-zinc-400 font-semibold uppercase tracking-wider">Hora Local (Venezuela)</span>
                                    <span className="text-sm font-bold font-display text-zinc-200">{currentTimeStr || "--:--:--"}</span>
                                </div>
                                <div className="hidden sm:flex items-center gap-2 bg-zinc-900 border border-zinc-800 px-3.5 py-1.5 rounded-full">
                                    <span className={`w-2.5 h-2.5 rounded-full ${
                                        broadcastStatus === 'on_air' ? 'bg-emerald-500 animate-ping' :
                                        broadcastStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' :
                                        broadcastStatus === 'off_air' ? 'bg-rose-600' :
                                        'bg-zinc-600'
                                    }`}></span>
                                    <span className="text-xs font-bold tracking-wider uppercase text-zinc-300">
                                        {broadcastStatus === 'on_air' ? "En Vivo" :
                                         broadcastStatus === 'connecting' ? "Conectando..." :
                                         broadcastStatus === 'off_air' ? "Sin Señal" :
                                         "Sintonizar"}
                                    </span>
                                </div>
                                {/* Hamburger Menu Button */}
                                <button 
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                    className="lg:hidden w-9 h-9 rounded-lg bg-zinc-900 border border-zinc-800 flex items-center justify-center text-zinc-400 hover:text-white transition-colors"
                                >
                                    <i className={`fas ${mobileMenuOpen ? 'fa-times' : 'fa-bars'} text-sm`}></i>
                                </button>
                            </div>
                        </div>

                        {/* Mobile Menu Dropdown */}
                        {mobileMenuOpen && (
                            <div className="lg:hidden mt-3 pt-3 border-t border-zinc-800 flex flex-col gap-2">
                                <a href="#" onClick={(e) => { e.preventDefault(); setMobileMenuOpen(false); smoothScrollTo(0, 1200); }} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 py-2 px-2 rounded-lg hover:bg-zinc-900 transition-all duration-300">Inicio</a>
                                <a href="#biografia" onClick={(e) => { scrollToSection(e, 'biografia'); setMobileMenuOpen(false); }} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 py-2 px-2 rounded-lg hover:bg-zinc-900 transition-all duration-300">Historia</a>
                                <a href="#comentarios" onClick={(e) => { scrollToSection(e, 'comentarios'); setMobileMenuOpen(false); }} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 py-2 px-2 rounded-lg hover:bg-zinc-900 transition-all duration-300">Programas</a>
                                <a href="#comentarios" onClick={(e) => { scrollToSection(e, 'comentarios'); setMobileMenuOpen(false); }} className="text-xs font-bold uppercase tracking-wider text-zinc-300 hover:text-rose-500 py-2 px-2 rounded-lg hover:bg-zinc-900 transition-all duration-300">Contacto</a>
                                <a href="https://micanal.ovh/channel/live-stream/oscarestereotv" target="_blank" rel="noopener noreferrer" className="text-xs font-bold uppercase tracking-wider text-emerald-500 hover:text-emerald-400 py-2 px-2 rounded-lg hover:bg-zinc-900 transition-all duration-300 flex items-center gap-1.5">
                                    <i className="fas fa-tv text-[10px]"></i> TV en Vivo
                                </a>
                                <div className="flex items-center gap-2 mt-2 pt-2 border-t border-zinc-800 px-2">
                                    <span className={`w-2.5 h-2.5 rounded-full ${
                                        broadcastStatus === 'on_air' ? 'bg-emerald-500 animate-ping' :
                                        broadcastStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' :
                                        broadcastStatus === 'off_air' ? 'bg-rose-600' :
                                        'bg-zinc-600'
                                    }`}></span>
                                    <span className="text-xs font-bold tracking-wider uppercase text-zinc-300">
                                        {broadcastStatus === 'on_air' ? "En Vivo" :
                                         broadcastStatus === 'connecting' ? "Conectando..." :
                                         broadcastStatus === 'off_air' ? "Sin Señal" :
                                         "Sintonizar"}
                                    </span>
                                </div>
                            </div>
                        )}
                    </nav>

                    {/* Header */}
                    <header className="relative w-full overflow-hidden bg-zinc-950 border-b border-zinc-900 bg-section bg-header-hero">
                        <div className="absolute inset-0 bg-gradient-to-r from-[#0b0b0c] via-zinc-950/90 to-transparent z-10"></div>
                        <div className="absolute inset-0 bg-gradient-to-t from-[#0b0b0c] to-transparent z-10"></div>
                        
                        <div className="max-w-7xl mx-auto px-4 md:px-8 py-10 md:py-16 relative z-20 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                            {/* Left Text Grid Column */}
                            <div className="lg:col-span-7 flex flex-col justify-center space-y-6">
                                <div className="inline-flex items-center gap-2 bg-rose-600/10 text-rose-500 border border-rose-500/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest w-fit">
                                    <i className="fas fa-broadcast-tower"></i> Transmitiendo desde Quebrada Arriba, Estado Lara, Venezuela
                                </div>
                                <h1 className="text-4xl md:text-6xl font-black tracking-tight text-white leading-none">
                                    Música, Noticias <br/>y <span className="text-rose-600">Deportes</span>
                                </h1>
                                <p className="text-zinc-400 text-base md:text-lg max-w-xl font-normal leading-relaxed">
                                    <strong>Oscar Estéreo 88.1 FM — Tu alternativa musical.</strong> Sintoniza la voz vibrante de la Parroquia El Blanco en el Estado Lara, Venezuela. Desde las majestuosas tierras de Quebrada Arriba, llevamos el mejor ritmo, información al instante y pasión deportiva a todos nuestros oyentes.
                                </p>
                                <div className="flex flex-wrap gap-3 pt-2">
                                    <a href="#biografia" onClick={(e) => scrollToSection(e, 'biografia')} className="bg-zinc-900 hover:bg-zinc-800 text-zinc-200 border border-zinc-800 transition px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 cursor-pointer">
                                        <i className="fas fa-info-circle text-rose-500"></i> Conocer Historia
                                    </a>
                                    <a href="#comentarios" onClick={(e) => scrollToSection(e, 'comentarios')} className="bg-rose-600 hover:bg-rose-700 text-white shadow-lg shadow-rose-600/20 transition px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2 cursor-pointer">
                                        <i className="fas fa-paper-plane"></i> Enviar Saludo
                                    </a>
                                    <a href="https://micanal.ovh/channel/live-stream/oscarestereotv" target="_blank" rel="noopener noreferrer" className="bg-emerald-600 hover:bg-emerald-700 text-white shadow-lg shadow-emerald-600/20 transition px-5 py-2.5 rounded-xl text-sm font-semibold flex items-center gap-2">
                                        <i className="fas fa-tv"></i> Oscar Estéreo Televisión
                                    </a>
                                </div>
                            </div>

                            {/* Right Player Column */}
                            <div className="lg:col-span-5 flex justify-center">
                                <div className="w-full max-w-sm bg-zinc-900/60 backdrop-blur-md border border-zinc-800/80 p-6 rounded-3xl shadow-2xl relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-rose-600/5 rounded-full blur-2xl"></div>
                                    
                                    {/* Turntable Header */}
                                    <div className="flex items-center justify-between mb-4">
                                        <div className="flex items-center gap-2">
                                            <i className="fas fa-compact-disc text-rose-500 animate-spin" style={{ animationDuration: '4s' }}></i>
                                            <span className="text-xs font-bold tracking-widest text-zinc-400 uppercase">Sintonizador Digital</span>
                                        </div>
                                        <button 
                                            onClick={() => setShowSettings(!showSettings)} 
                                            className="text-zinc-400 hover:text-white transition w-8 h-8 rounded-lg bg-zinc-800 flex items-center justify-center border border-zinc-700"
                                            title="Configurar Stream"
                                        >
                                            <i className={`fas fa-cog ${showSettings ? 'rotate-90' : ''} transition-transform`}></i>
                                        </button>

                                        required
                                        maxLength="200"
                                        className="w-full bg-zinc-950 border border-zinc-800/80 rounded-xl px-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-rose-600 focus:ring-1 focus:ring-rose-600 transition"
                                    ></textarea>
                                </div>

                                <div>
                                    <label className="text-xs font-bold uppercase tracking-wider text-zinc-400 block mb-1">Pedir una Canción (Opcional)</label>
                                    <div className="relative">
                                        <span className="absolute left-3.5 top-3 text-zinc-500 text-sm"><i className="fas fa-music"></i></span>
                                        <input 
                                            type="text" 
                                            value={songRequest}
                                            onChange={(e) => setSongRequest(e.target.value)}
                                            placeholder="Artista - Nombre del tema" 
                                            maxLength="50"
                                            className="w-full bg-zinc-950 border border-zinc-800/80 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-rose-600 focus:ring-1 focus:ring-rose-600 transition"
                                        />
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={isSubmitting}
                                    className="w-full bg-rose-600 hover:bg-rose-700 disabled:bg-zinc-800 text-white py-3 rounded-xl text-sm font-bold tracking-wider transition-all transform hover:scale-[1.01] shadow-lg shadow-rose-600/10 flex items-center justify-center gap-2"
                                >
                                    {isSubmitting ? (
                                        <>
                                            <i className="fas fa-spinner animate-spin"></i>
                                            <span>Enviando saludo...</span>
                                        </>
                                    ) : (
                                        <>
                                            <i className="fas fa-paper-plane"></i>
                                            <span>Enviar Saludo al Aire</span>
                                        </>
                                    )}
                                </button>
                            </form>
                        </div>

                        {/* Right Column: Comments board scroll list */}
                        <div className="lg:col-span-7 flex flex-col h-[520px] bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden shadow-2xl">
                            
                            {/* Board Header */}
                            <div className="bg-zinc-900 px-6 py-4 border-b border-zinc-800 flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <span className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-ping"></span>
                                    <span className="font-bold text-white text-sm">Pizarra Digital en Vivo</span>
                                </div>
                                <span className="text-xs text-zinc-400 font-semibold">{comments.length} Mensajes</span>
                            </div>

                            {/* Message List */}
                            <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                {comments.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-center p-6 space-y-3">
                                        <div className="w-12 h-12 rounded-full bg-zinc-900 flex items-center justify-center text-zinc-500 text-xl border border-zinc-850">
                                            <i className="far fa-comments"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-white font-bold text-sm">No hay mensajes recientes</h4>
                                            <p className="text-xs text-zinc-500 mt-1">¡Sé el primero en saludar a Oscar Estéreo!</p>
                                        </div>
                                    </div>
                                ) : (
                                    comments.map((c) => (
                                        <div key={c.id} className="bg-zinc-900/50 border border-zinc-800/60 p-4 rounded-xl flex items-start gap-3.5 hover:bg-zinc-900 transition">
                                            
                                            {/* Avatar element */}
                                            <div className="w-9 h-9 rounded-full bg-rose-600/10 border border-rose-500/20 flex items-center justify-center text-rose-500 font-bold font-display text-sm flex-shrink-0">
                                                {c.author.substring(0, 1).toUpperCase()}
                                            </div>

                                            {/* Text body */}
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center justify-between gap-2 mb-1">
                                                    <h4 className="text-sm font-extrabold text-white truncate">{c.author}</h4>
                                                    <span className="text-[10px] text-zinc-500 font-medium whitespace-nowrap">
                                                        {new Date(c.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                                    </span>
                                                </div>
                                                <p className="text-xs text-zinc-300 leading-relaxed break-words">{c.text}</p>
                                                
                                                {/* Song request highlight pill */}
                                                {c.request && (
                                                    <div className="inline-flex items-center gap-1.5 bg-rose-600/10 text-rose-400 border border-rose-500/10 px-2 py-0.5 rounded-md text-[10px] font-bold mt-2">
                                                        <i className="fas fa-compact-disc animate-spin" style={{ animationDuration: '3s' }}></i>
                                                        <span className="uppercase tracking-wider">Petición:</span>
                                                        <span className="text-zinc-200">{c.request}</span>
                                                    </div>
                                                )}
                                            </div>

                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                    </section>

                    {/* Modern Minimalist Footer */}
                    <footer className="bg-zinc-950 border-t border-zinc-900 py-12 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                            
                            {/* Brand info column */}
                            <div className="md:col-span-5 space-y-4">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full overflow-hidden border border-rose-600">
                                        <img 
                                            src="images/logo_oscar-stereo.png" 
                                            alt="Oscar Estéreo 88.1" 
                                            className="w-full h-full object-cover"
                                            onError={(e) => { e.target.src='https://placehold.co/40x40/222222/e11d48?text=OE' }}
                                        />
                                    </div>
                                    <span className="font-display font-black text-lg tracking-wider text-white">OSCAR <span className="text-rose-600">ESTÉREO</span></span>
                                </div>
                                <p className="text-xs text-zinc-500 max-w-sm">
                                    La emisora comunitaria que conecta a Quebrada Arriba, Lara y toda Venezuela con excelente música, transmisiones deportivas en directo e información confiable de nuestra localidad.
                                </p>
                            </div>

                            {/* Middle Quick Links */}
                            <div className="md:col-span-3">
                                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400 mb-3">Estación Digital</h4>
                                <ul className="space-y-2 text-xs text-zinc-500">
                                    <li><a href="#biografia" onClick={(e) => scrollToSection(e, 'biografia')} className="hover:text-rose-500 transition cursor-pointer">Historia y Raíces</a></li>
                                    <li><a href="#comentarios" onClick={(e) => scrollToSection(e, 'comentarios')} className="hover:text-rose-500 transition cursor-pointer">Buzón de Mensajes</a></li>
                                    <li><a href="https://micanal.ovh/channel/live-stream/oscarestereotv" target="_blank" rel="noopener noreferrer" className="hover:text-emerald-500 transition flex items-center gap-1.5"><i className="fas fa-tv text-emerald-600"></i> Oscar Estéreo TV</a></li>
                                    <li><button onClick={() => setShowSettings(true)} className="hover:text-rose-500 transition text-left">Cambiar Servidor Stream</button></li>
                                </ul>
                            </div>

                            {/* Social Engagement contact column */}
                            <div className="md:col-span-4 space-y-4">
                                <h4 className="text-xs font-bold uppercase tracking-wider text-zinc-400">Ponte en contacto directo</h4>
                                <div className="flex flex-wrap gap-2.5">
                                    
                                    {/* Whatsapp Link */}
                                    <a 
                                        href="https://wa.me/584262179553" 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="bg-[#25D366]/10 hover:bg-[#25D366]/20 border border-[#25D366]/20 text-[#25D366] px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-whatsapp"></i> WhatsApp Cabina
                                    </a>

                                    {/* Instagram Link */}
                                    <a 
                                        href="https://instagram.com" 
                                        target="_blank" 
                                        rel="noopener noreferrer"
                                        className="bg-rose-600/10 hover:bg-rose-600/20 border border-rose-500/20 text-rose-500 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center gap-2"
                                    >
                                        <i className="fab fa-instagram"></i> Instagram
                                    </a>
                                </div>
                                <div className="text-[10px] text-zinc-600">
                                    Dial: <span className="text-zinc-400">88.1 MHz FM</span> | Quebrada Arriba, Parroquia El Blanco, Lara - Venezuela.
                                </div>
                            </div>
                        </div>

                        {/* Copyright tag */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-10 pt-6 border-t border-zinc-900 flex flex-col sm:flex-row items-center justify-between gap-4 text-[10px] text-zinc-600">
                            <div>
                                &copy; {new Date().getFullYear()} Oscar Estéreo 88.1 FM. Todos los derechos reservados.
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="hover:text-zinc-400 transition cursor-pointer">Términos de Servicio</span>
                                <span className="hover:text-zinc-400 transition cursor-pointer">Políticas de Privacidad</span>
                            </div>
                        </div>

                        {/* Aliados Comerciales y Créditos */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-8 pt-6 border-t border-zinc-900">
                            <h4 className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-4 text-center">Aliados y Créditos</h4>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 text-[10px] text-zinc-500">
                                <a href="https://adolfogelabert.github.io/" target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-code text-rose-600"></i> Diseño y desarrollo: Adolfo J. Gelabert Semeco
                                </a>
                                <span className="hidden sm:inline text-zinc-700">|</span>
                                <a href="https://nelsysnavas.github.io/historiasmusicales/" target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-music text-rose-600"></i> Colaboración: Nelsys Milagros Navas R. — Historias Musicales
                                </a>
                                <span className="hidden sm:inline text-zinc-700">|</span>
                                <a href="https://nelsysnavas.github.io/vocesdevenezuela/" target="_blank" rel="noopener noreferrer" className="hover:text-rose-500 transition flex items-center gap-1.5">
                                    <i className="fas fa-microphone text-rose-600"></i> Voces de Venezuela
                                </a>
                            </div>
                        </div>

                        {/* Google AdWords - Espacio publicitario reservado */}
                        <div className="max-w-7xl mx-auto px-4 md:px-8 mt-8 pt-6 border-t border-zinc-900">
                            <div className="bg-zinc-900/40 border border-zinc-800/60 rounded-2xl p-6 text-center">
                                <span className="text-[10px] text-zinc-600 uppercase tracking-widest font-semibold block mb-2">Publicidad</span>
                                <div className="min-h-[90px] flex items-center justify-center">
                                    {/* Google AdWords - Coloca tu código de anuncio aquí */}
                                    <p className="text-[10px] text-zinc-600 italic">Espacio reservado para publicidad</p>
                                </div>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
